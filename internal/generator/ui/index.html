<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoDoc Live</title>
  <!-- Flash-free theme loading (Section 10.12) -->
  <script>
    (function() {
      var t = localStorage.getItem('gdl-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============================================================
       TOPBAR (Section 10.3)
       ============================================================ -->
  <header class="topbar" role="banner">
    <div class="topbar-left">
      <button class="topbar-btn sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="sidebar">
        <svg aria-hidden="true" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="topbar-logo" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 6h16M4 12h10M4 18h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="20" cy="16" r="3" fill="currentColor" opacity="0.6"/>
        </svg>
      </div>
      <span class="topbar-project-name" id="project-name">My API</span>
      <span class="topbar-version" id="project-version">v1.0.0</span>
    </div>

    <div class="topbar-center">
      <div class="search-wrapper">
        <svg class="search-icon" aria-hidden="true" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M7 12A5 5 0 107 2a5 5 0 000 10zM14 14l-3.5-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          class="search-input"
          id="search-input"
          placeholder="Search endpoints..."
          autocomplete="off"
          spellcheck="false"
          aria-label="Search endpoints"
        >
        <span class="search-shortcut" id="search-shortcut" aria-hidden="true">/</span>
      </div>
    </div>

    <div class="topbar-right">
      <button class="authorize-btn" id="authorize-btn" title="Authorize" aria-label="Authorize API access">
        <svg aria-hidden="true" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="7" width="10" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M5.5 7V5a2.5 2.5 0 015 0v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span id="authorize-btn-text">Authorize</span>
      </button>
      <button class="topbar-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark theme">
        <svg aria-hidden="true" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 2.5v11a5.5 5.5 0 000-11z" fill="currentColor"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Sidebar overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <!-- ============================================================
       SIDEBAR (Section 10.4)
       ============================================================ -->
  <aside class="sidebar" id="sidebar" role="navigation" aria-label="API endpoints navigation">
    <div class="sidebar-groups" id="sidebar-groups">
      <!-- Populated by app.js -->
    </div>
    <div class="sidebar-footer" id="sidebar-footer">
      <!-- Populated by app.js -->
    </div>
  </aside>

  <!-- ============================================================
       CONTENT AREA (Section 10.2)
       ============================================================ -->
  <main class="content-area" id="content-area" role="main">
    <div class="content-inner" id="content-inner">
      <!-- Endpoint cards populated by app.js -->
    </div>
  </main>

  <!-- ============================================================
       AUTHORIZE MODAL
       ============================================================ -->
  <div class="modal-overlay" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="auth-modal-title">Authorize</span>
        <button class="modal-close" id="auth-modal-close" aria-label="Close modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="auth-section" data-auth-scheme="bearer">
          <div class="auth-section-header">
            <div class="auth-section-title">Bearer Token</div>
            <span class="auth-section-status" id="auth-status-bearer"></span>
          </div>
          <div class="auth-input-group">
            <label class="auth-input-label" for="auth-bearer-token">Token</label>
            <input type="text" class="auth-input" id="auth-bearer-token" placeholder="eyJhbGciOi...">
          </div>
        </div>
        <div class="auth-section" data-auth-scheme="apikey">
          <div class="auth-section-header">
            <div class="auth-section-title">API Key</div>
            <span class="auth-section-status" id="auth-status-apikey"></span>
          </div>
          <div class="auth-input-group">
            <label class="auth-input-label" for="auth-apikey-header">Header Name</label>
            <input type="text" class="auth-input" id="auth-apikey-header" placeholder="X-API-Key" value="X-API-Key">
          </div>
          <div class="auth-input-group">
            <label class="auth-input-label" for="auth-apikey-value">Value</label>
            <input type="text" class="auth-input" id="auth-apikey-value" placeholder="your-api-key">
          </div>
        </div>
        <div class="auth-section" data-auth-scheme="basic">
          <div class="auth-section-header">
            <div class="auth-section-title">Basic Auth</div>
            <span class="auth-section-status" id="auth-status-basic"></span>
          </div>
          <div class="auth-input-group">
            <label class="auth-input-label" for="auth-basic-user">Username</label>
            <input type="text" class="auth-input" id="auth-basic-user" placeholder="username">
          </div>
          <div class="auth-input-group">
            <label class="auth-input-label" for="auth-basic-pass">Password</label>
            <input type="password" class="auth-input" id="auth-basic-pass" placeholder="password">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="auth-modal-clear">Clear</button>
        <button class="btn-primary" id="auth-modal-save">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
